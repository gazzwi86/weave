name: CI

on:
  # push runs only on main (post-merge verification); PRs get their own run.
  # Scoping push to main avoids the double-run where a branch push and its PR
  # both trigger the full suite.
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
      # BE-SDK-1 sdkgen tests shell out to a real `tsc --noEmit` (AC-7 --
      # the emitted TypeScript must actually compile, not just look
      # plausible). Install just the compiler, not the whole frontend
      # workspace: the generated SDK has zero external node_modules
      # dependencies (see sdkgen/templates/typescript/tsconfig.json.j2).
      # Pinned to major version 5 (frontend's own `^5` pin, currently
      # 5.9.3) -- unpinned `npm install -g typescript` silently tracked
      # "latest" forward to TS 7, which hard-removed the deprecated
      # `moduleResolution: "node"` value the generated tsconfig uses
      # (TS5108), breaking this job while local `npm ci` runs (which
      # respect the frontend lockfile) stayed green. Matching the
      # frontend's major version is the actual fix, not a path issue.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: npm install -g typescript@5
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run mypy src/ tests/
      - run: uv run pytest -m "not docker and not e2e"
        env:
          WEAVE_TSC_BIN: tsc

  # PR #11 finding 5: the docker-marked tenancy security suite
  # (tests/integration/test_tenancy_isolation.py) was never run in CI --
  # the `api` job above excludes anything `docker`-marked. Starts only the
  # services those tests need (not ollama, and not the full
  # test_local_stack.py lifecycle, which is `stack`-marked and excluded).
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
      # BE-SDK-1 sdkgen integration tests shell out to a real `tsc --noEmit`
      # (AC-7); see the `api` job above for why only the compiler (not the
      # whole frontend workspace) is installed, and why it's pinned to
      # major version 5.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: npm install -g typescript@5
      - run: docker compose up -d --wait postgres redis oxigraph localstack
      - name: Wait for oxigraph HTTP API
        run: |
          for i in $(seq 1 30); do
            curl -sf "http://localhost:7878/query?query=ASK%20%7B%20%3Fs%20%3Fp%20%3Fo%20%7D" && exit 0
            sleep 2
          done
          echo "oxigraph never became ready" >&2
          exit 1
      - working-directory: packages/backend
        run: uv sync
      - working-directory: packages/backend
        run: uv run pytest -m "integration and docker and not stack"
        env:
          WEAVE_TSC_BIN: tsc
      - if: always()
        run: docker compose down -v

  ce-perf:
    # CE-TASK-008 spike gate (AC-008-06): benchmarks CE's core read/write hot
    # paths against the live stack. Runs the 10k M1 gating corpus only
    # (CE_PERF_CORPUS_SIZES) -- 100k/500k are non-gating and currently crash the
    # 5s Oxigraph client timeout (ADR-004), so there's no value burning CI
    # minutes on known timeouts. INFORMATIONAL (continue-on-error) until the
    # first green run is validated and the 100k delta-patch remediation lands;
    # promote to blocking then (mirrors the mutation-strict validation path).
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    env:
      WEAVE_ENV: test
      CE_PERF_CORPUS_SIZES: "10000"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
      - run: docker compose up -d --wait postgres redis oxigraph localstack
      - name: Wait for oxigraph HTTP API
        run: |
          for i in $(seq 1 30); do
            curl -sf "http://localhost:7878/query?query=ASK%20%7B%20%3Fs%20%3Fp%20%3Fo%20%7D" && exit 0
            sleep 2
          done
          echo "oxigraph never became ready" >&2
          exit 1
      - working-directory: packages/backend
        run: uv sync
      - name: Apply DB migrations (creates the weave_app role + schema)
        working-directory: packages/backend
        run: uv run python -m weave_backend.db.migrate
      - name: Run CE perf benchmark (10k gating corpus)
        working-directory: packages/backend
        env:
          # LocalStack's cloudwatch is broken in this env (every put_metric_data
          # 500s); the resulting flood of failing fire-and-forget boto3 calls
          # starves the shared thread pool the write path itself relies on
          # (asyncio.to_thread), inflating measured write latency. The metric
          # is best-effort observability with zero value here -- disable it
          # for this step only. Prod and the integration/mutation jobs keep it on.
          WEAVE_DISABLE_MUTATION_METRICS: "1"
        run: uv run python ../../scripts/benchmarks/ce-perf/run_benchmark.py
      - name: Echo JSON report to the log
        if: always()
        run: cat scripts/benchmarks/ce-perf/reports/summary.json || true
      - if: always()
        run: docker compose down -v

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/frontend/package-lock.json
      - run: npm ci
      # ONB-TASK-007: frontend imports `../../../shared/onboarding/*` source
      # directly (no workspaces field -- see anchors.ts precedent), so
      # packages/shared's own deps (zod) must be installed for tsc to
      # resolve types, or every such import silently widens to `any`.
      - run: npm ci
        working-directory: packages/shared
      # vitest.config.ts runs a second "storybook" project via
      # @vitest/browser-playwright (chromium) alongside the jsdom unit project;
      # `npm test` launches it, so the browser must be installed or the run
      # dies on "chrome-headless-shell doesn't exist".
      - run: npx playwright install --with-deps chromium
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm audit --audit-level=high
      # `next build` collects page data for /api/auth/[...nextauth], which loads
      # auth.ts and asserts the auth secrets. These are throwaway build-time
      # placeholders only — a real deploy injects the true values from AWS
      # Secrets Manager at runtime, never from CI.
      - run: npm run build
        env:
          AUTH_SECRET: build-time-placeholder-not-used-at-runtime
          OIDC_CLIENT_SECRET: build-time-placeholder-not-used-at-runtime

  shared:
    # packages/shared: onboarding anchor registry + content config (ADR-005,
    # ADR-006, ADR-008). Own job -- shared is a standalone npm package (no
    # workspaces field), not yet imported by packages/frontend (that lands
    # with TASK-007+). The data-tour-id audit runs against the real frontend
    # tree so drift fails PRs the moment an owning task plants an attribute.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/shared
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/shared/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npx tsx onboarding/scripts/audit-anchors.ts ../frontend

  invariants-check:
    # TASK-030 AC-5: runs the M2 invariants checklist runner -- no services
    # needed, pure static/grep checks against the repo tree.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: python3 scripts/m2_gate/invariants_check.py --out artefacts/m2-gate/invariants.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: m2-gate-invariants
          path: artefacts/m2-gate/invariants.json

  axe-m2:
    # TASK-030 AC-2: zero axe-core violations on every M2 panel/dialog.
    # Same docker-compose + migrate precondition as `integration`; Explorer
    # itself boots via playwright.config.ts's own webServer entries (frontend
    # dev server + backend uvicorn + mock-oidc), same as the `web` job's
    # existing E2E runs.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/frontend/package-lock.json
      - run: docker compose up -d --wait postgres redis oxigraph localstack
      - name: Wait for oxigraph HTTP API
        run: |
          for i in $(seq 1 30); do
            curl -sf "http://localhost:7878/query?query=ASK%20%7B%20%3Fs%20%3Fp%20%3Fo%20%7D" && exit 0
            sleep 2
          done
          echo "oxigraph never became ready" >&2
          exit 1
      - working-directory: packages/backend
        run: uv sync
      - name: Apply DB migrations (creates the weave_app role + schema)
        working-directory: packages/backend
        run: uv run python -m weave_backend.db.migrate
      - working-directory: packages/frontend
        run: npm ci
      - working-directory: packages/shared
        run: npm ci
      - working-directory: packages/frontend
        run: npx playwright install --with-deps chromium
      - working-directory: packages/frontend
        run: npx playwright test tests/e2e/explorer-a11y-m2.spec.ts
        env:
          AUTH_SECRET: build-time-placeholder-not-used-at-runtime
          OIDC_CLIENT_SECRET: build-time-placeholder-not-used-at-runtime
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: m2-gate-axe
          path: packages/frontend/playwright-report/
      - if: always()
        run: docker compose down -v

  lighthouse-explorer:
    # TASK-030 AC-3: Lighthouse on the Explorer route with M2 panels active
    # -- performance >= 90, accessibility >= 95, best practices >= 90.
    # Same stack precondition as axe-m2; frontend served directly (not via
    # playwright.config.ts's webServer) since lhci drives its own Chrome.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/frontend/package-lock.json
      - run: docker compose up -d --wait postgres redis oxigraph localstack
      - name: Wait for oxigraph HTTP API
        run: |
          for i in $(seq 1 30); do
            curl -sf "http://localhost:7878/query?query=ASK%20%7B%20%3Fs%20%3Fp%20%3Fo%20%7D" && exit 0
            sleep 2
          done
          echo "oxigraph never became ready" >&2
          exit 1
      - working-directory: packages/backend
        run: uv sync
      - working-directory: packages/backend
        run: uv run python -m weave_backend.db.migrate
      # lhci's puppeteerScript hits the real backend unmocked (unlike
      # axe-m2's Playwright spec, which mocks every proxy route) -- without
      # seeding, mock-oidc's default login has no workspace membership, so
      # every workspace-scoped route 400s post-login and the canvas never
      # mounts (loadCanvas catches -> loadState "error" -> layoutstop never
      # fires -> lhci-explorer-login.js's waitForFunction times out at 30s).
      - name: Seed demo data (workspace membership for mock-oidc login)
        working-directory: packages/backend
        run: uv run python -m weave_backend.db.seed_demo
      - name: Start backend + mock OIDC
        working-directory: packages/backend
        run: |
          uv run uvicorn weave_backend:app --port 8000 &
          uv run weave-mock-oidc &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/health && break
            sleep 2
          done
      - working-directory: packages/frontend
        run: npm ci
      - working-directory: packages/shared
        run: npm ci
      - name: Start Explorer frontend
        working-directory: packages/frontend
        run: |
          npm run dev &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 && break
            sleep 2
          done
        env:
          AUTH_SECRET: build-time-placeholder-not-used-at-runtime
          OIDC_CLIENT_SECRET: build-time-placeholder-not-used-at-runtime
          OIDC_ISSUER_URL: http://localhost:9001
          OIDC_CLIENT_ID: weave-dev
          BACKEND_API_URL: http://localhost:8000
      - id: setup-chrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2
      - working-directory: packages/frontend
        run: npx @lhci/cli@0.14 autorun --config=./lighthouserc-explorer.json
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: m2-gate-lighthouse
          path: artefacts/m2-gate/lighthouse/
      - if: always()
        run: docker compose down -v

  perf-m2:
    # TASK-030 AC-4: filter/overlay/badge apply <= 300ms p95 (existing
    # p95-tagged Playwright specs), view save <= 800ms p95
    # (run_view_save_benchmark.py, ADR-004 in-process percentile-loop
    # pattern -- mirrors ce-perf's own run_benchmark.py).
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/frontend/package-lock.json
      - run: docker compose up -d --wait postgres redis oxigraph localstack
      - name: Wait for oxigraph HTTP API
        run: |
          for i in $(seq 1 30); do
            curl -sf "http://localhost:7878/query?query=ASK%20%7B%20%3Fs%20%3Fp%20%3Fo%20%7D" && exit 0
            sleep 2
          done
          echo "oxigraph never became ready" >&2
          exit 1
      - working-directory: packages/backend
        run: uv sync
      - working-directory: packages/backend
        run: uv run python -m weave_backend.db.migrate
      - name: Client-apply perf specs (filter/overlay/badge, 300ms p95)
        working-directory: packages/frontend
        run: |
          npm ci
          (cd ../shared && npm ci)
          npx playwright install --with-deps chromium
          npx playwright test -g "p95" tests/e2e/canvas-load.spec.ts tests/e2e/explorer-filters-layers.spec.ts tests/e2e/explorer-overlays.spec.ts
        env:
          AUTH_SECRET: build-time-placeholder-not-used-at-runtime
          OIDC_CLIENT_SECRET: build-time-placeholder-not-used-at-runtime
      - name: View-save perf benchmark (800ms p95)
        working-directory: packages/backend
        run: uv run python ../../scripts/benchmarks/ce-perf/run_view_save_benchmark.py
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: m2-gate-perf
          path: |
            packages/frontend/playwright-report/
            scripts/benchmarks/ce-perf/reports/view-save-summary.json
      - if: always()
        run: docker compose down -v

  mutation:
    # Per-PR tier. Runs unit tests only (fast, no services). Enforces the single
    # 60% mutation bar (ADV-005) via mutation_gate's default — no threshold
    # override. The unit-only lane sits at ~64.5% (measured), above the 60 bar,
    # so a regression that drops it below 60 fails the PR. BLOCKING (no
    # continue-on-error). The strict tier below runs the same 60 bar with live
    # services on main-push, where the SQL/boto3 mutants this lane cannot reach
    # are also killed (~77% measured).
    #
    # Sharded 2-way (2026-07-10): the full per-PR corpus (~13.4k mutants) started
    # missing the 10-min job budget as the codebase grew (mutant *generation* is
    # fast and unavoidably runs in full each shard; mutant *execution* — the slow
    # part — is what `mutmut run <patterns>` filters, so splitting the executed
    # set in half genuinely roughly halves wall-clock). Shards are a hand-balanced
    # module-name split by LOC (not alphabetical — `routers`/`build` are large
    # enough on their own to make a naive a-m/n-z cut lopsided), matched via
    # mutmut's `weave_backend.<module>.*` mutant-key glob filter. Gating each
    # shard independently at the same 60% bar is safe, not just convenient: a
    # weighted average of two numbers that are each >= 60% is itself >= 60%, so
    # per-shard gating can only be as strict or stricter than gating the
    # combined total — no merge step needed.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: a
            patterns: >-
              weave_backend.routers.* weave_backend.audit.* weave_backend.repo_bootstrap.*
              weave_backend.requests.* weave_backend.billing.* weave_backend.auth.*
              weave_backend.deploy.* weave_backend.tenancy.* weave_backend.rdf.*
              weave_backend.settings.* weave_backend.ontology.* weave_backend.identity.*
              weave_backend.ai.* weave_backend.storage.* weave_backend.search.*
              weave_backend.briefs.* weave_backend.rate_limit.* weave_backend.__init__*
          - shard: b
            patterns: >-
              weave_backend.build.* weave_backend.schemas.* weave_backend.operations.*
              weave_backend.generation.* weave_backend.projects.* weave_backend.pm.*
              weave_backend.notifications.* weave_backend.authoring.* weave_backend.standards.*
              weave_backend.db.* weave_backend.mock_oidc.* weave_backend.observability.*
              weave_backend.instances.* weave_backend.nl_query.* weave_backend.connectors.*
              weave_backend.scripts.* weave_backend.rbac.* weave_backend.health_checks.*
    defaults:
      run:
        working-directory: packages/backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
      # mutmut's baseline run exercises the full unit suite, including the
      # BE-SDK-1 sdkgen tests that shell out to a real `tsc --noEmit` (AC-7);
      # see the `api` job above for why only the compiler is installed, and
      # why it's pinned to major version 5.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: npm install -g typescript@5
      - run: uv sync
      - run: uv run mutmut run ${{ matrix.patterns }} || true
        env:
          WEAVE_TSC_BIN: tsc
      - run: uv run mutmut export-cicd-stats
      # Blocking gate: fails the PR if this shard's score drops below the regression floor.
      - name: Enforce mutation score threshold
        run: |
          # tee the score to the run summary so it is visible without opening logs;
          # pipefail preserves the gate's non-zero exit so the job actually fails.
          set -o pipefail
          uv run python -m weave_backend.scripts.mutation_gate mutants/mutmut-cicd-stats.json \
            | tee -a "$GITHUB_STEP_SUMMARY"

  mutation-strict:
    # Deterministic thorough tier. Runs post-merge on main (not per-PR: mutating
    # against live services blows the 10-min PR budget). Boots the same services
    # as the integration job and lets mutmut exercise the integration suite too,
    # so the SQL/AWS mutants the per-PR job cannot reach are killed here (~77%
    # measured). Enforces the same single 60% bar as the per-PR tier (no
    # MUTATION_SCORE_THRESHOLD env → mutation_gate's 60% default). BLOCKING (no
    # continue-on-error). Deterministic backstop so the bar does not rest solely
    # on the model-executed phase gate.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    # Post-merge job, not on the PR critical path: sized from a measured local
    # full run (~10 min on a dev machine) with headroom for slower CI runners.
    timeout-minutes: 60
    env:
      # Include the integration/docker suite (override pyproject's fast-run marker
      # filter); still exclude e2e and the self-managed full-stack tests.
      PYTEST_ADDOPTS: "-m 'not e2e and not stack'"
      # platform_stack's session teardown must not `down -v` between mutant
      # runs -- every docker-covered mutant would pay a cold service boot and
      # blow the job timeout. This job's final `docker compose down -v` step
      # owns teardown.
      WEAVE_KEEP_STACK: "1"
    defaults:
      run:
        working-directory: packages/backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"
      # mutmut's baseline run exercises the full suite (incl. the docker/
      # integration-marked sdkgen pipeline test on this job), including the
      # BE-SDK-1 sdkgen tests that shell out to a real `tsc --noEmit`
      # (AC-7); see the `api` job above for why only the compiler is
      # installed, and why it's pinned to major version 5. This is also
      # the job where the fixed-hop-count tsc path bug bit: mutmut stages
      # mutated sources one directory deeper.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: npm install -g typescript@5
      - working-directory: .
        run: docker compose up -d --wait postgres redis oxigraph localstack
      - run: uv sync
      - run: uv run mutmut run || true
        env:
          WEAVE_TSC_BIN: tsc
      - run: uv run mutmut export-cicd-stats
      - name: Enforce mutation score (60% bar, with services)
        run: |
          set -o pipefail
          uv run python -m weave_backend.scripts.mutation_gate mutants/mutmut-cicd-stats.json \
            | tee -a "$GITHUB_STEP_SUMMARY"
      - if: always()
        working-directory: .
        run: docker compose down -v

  secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install gitleaks
        run: |
          curl -sSL -o gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
      - run: gitleaks detect --source . --config .gitleaks.toml --redact

  deploy-essential-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [api, web, mutation, secrets]
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra/terraform/environments/dev
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
      # No-op (skipped) until a human bootstraps the DEPLOY_ROLE_ARN repo
      # variable and its IAM trust policy out-of-band — see
      # infra/terraform/README.md. This is the HITL gate for the very first
      # real deploy; nothing here ever stores AWS keys as GitHub secrets.
      - name: Configure AWS credentials via OIDC
        if: vars.DEPLOY_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ vars.DEPLOY_ROLE_ARN }} # repo variable, never a stored secret
          aws-region: ap-southeast-2
      - name: Terraform init
        if: vars.DEPLOY_ROLE_ARN != ''
        run: |
          # role assumed via vars.DEPLOY_ROLE_ARN (OIDC, no stored AWS keys)
          terraform init
      - name: Terraform plan (essential stack only)
        if: vars.DEPLOY_ROLE_ARN != ''
        run: terraform plan -input=false -var-file=dev.tfvars -var=deploy_prod_stack=false
      - name: Terraform apply (essential stack only)
        if: vars.DEPLOY_ROLE_ARN != ''
        run: terraform apply -input=false -auto-approve -var-file=dev.tfvars -var=deploy_prod_stack=false

  semgrep:
    runs-on: ubuntu-latest
    container:
      # Pinned to a digest like every action in this file; `--config auto` still
      # pulls the live registry ruleset, so an upstream rule rename can redden a
      # PR or invalidate a nosemgrep waiver — tracked in the QA ledger.
      image: semgrep/semgrep:1.168.0@sha256:59fbed6127ea7c5dde3ba6a85142733bb20ea9aaa36120c953904f1539aaf66e
    # Blocking: the 6 initial findings are triaged (inline nosemgrep waivers with
    # justifications — 2 asyncpg false-positives, 4 intended/deferred infra items).
    # A new un-waived finding now fails the build.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: semgrep scan --config auto --error
