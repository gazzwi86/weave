# Weave supported-languages manifest.
#
# Each language is assigned a tier describing what Graphify + downstream
# extractors can reliably produce. Discover reads this manifest, intersects
# with `cloc`/`tokei` output for the repo, and emits
# `.claude/state/discovery/coverage.yml`. The coverage banner in every shard
# quotes the resulting percentage and names excluded languages.
#
# Tiers:
#   full              — call graph + symbol table + module edges trustworthy.
#                       Eligible for C4 L3/L4 emission, class diagrams, drift
#                       metrics, all architecture shards.
#   partial-syntactic — file/module edges + top-level symbol extraction only.
#                       C4 L3/L4 and class diagrams NOT emitted for this
#                       language; blind_spots frontmatter lists files excluded.
#   unsupported       — no extraction. Files are enumerated in blind_spots but
#                       not analysed.
#
# Fail-closed rule (see .claude/settings.json
# weave.brownfield.coverage.minPctForDeepArtefacts, default 85):
#   If sum of full-tier LOC is < threshold, discover refuses to emit C4 L3/L4
#   and drift metrics. Shards still emit with visible blind_spots listing.

languages:
  typescript:
    tier: full
    extensions: [.ts, .tsx]
  javascript:
    tier: full
    extensions: [.js, .jsx, .mjs, .cjs]
  python:
    tier: full
    extensions: [.py]
  go:
    tier: full
    extensions: [.go]
  java:
    tier: full
    extensions: [.java]

  ruby:
    tier: partial-syntactic
    extensions: [.rb, .rake]
    notes: "Dynamic dispatch + metaprogramming + ActiveSupport callbacks invisible to graph."
  kotlin:
    tier: partial-syntactic
    extensions: [.kt, .kts]
    notes: "DI via Hilt/Koin + coroutine flows not represented."
  swift:
    tier: partial-syntactic
    extensions: [.swift]
    notes: "Protocol-oriented dispatch + SwiftUI bindings invisible."
  scala:
    tier: partial-syntactic
    extensions: [.scala, .sc]
    notes: "Implicits + macros not traced."
  csharp:
    tier: partial-syntactic
    extensions: [.cs]
    notes: "DI container wirings + reflection not traced."
  rust:
    tier: partial-syntactic
    extensions: [.rs]
    notes: "Trait-object dispatch + macro-expanded code not traced."
  php:
    tier: partial-syntactic
    extensions: [.php]
  elixir:
    tier: partial-syntactic
    extensions: [.ex, .exs]
    notes: "GenServer message passing + Phoenix channels not represented."

  # Unsupported languages: enumerated for completeness; extraction is not
  # attempted. If a project has meaningful LOC in these, they appear in
  # blind_spots and deep-artefact emission is gated by the coverage threshold.
  c:
    tier: unsupported
    extensions: [.c, .h]
  cpp:
    tier: unsupported
    extensions: [.cc, .cpp, .cxx, .hpp, .hxx]
  objective-c:
    tier: unsupported
    extensions: [.m, .mm]
  haskell:
    tier: unsupported
    extensions: [.hs]
  ocaml:
    tier: unsupported
    extensions: [.ml, .mli]
  erlang:
    tier: unsupported
    extensions: [.erl]
  clojure:
    tier: unsupported
    extensions: [.clj, .cljs, .cljc]
  r:
    tier: unsupported
    extensions: [.r, .R]
  sql:
    tier: unsupported
    extensions: [.sql]
    notes: "Schema files surface via data-model.md extraction, not as a language."
  shell:
    tier: unsupported
    extensions: [.sh, .bash, .zsh]
    notes: "Scripts are enumerated but not included in call-graph analysis."
