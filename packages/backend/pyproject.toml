[project]
name = "weave-backend"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Gareth Williams", email = "gazzwi86@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.116.0",
    "asyncpg>=0.31.0",
    "boto3>=1.43.40",
    "fastapi>=0.139.0",
    "httpx>=0.28.1",
    "opentelemetry-api>=1.43.0",
    "opentelemetry-exporter-otlp-proto-grpc>=1.43.0",
    "opentelemetry-instrumentation-fastapi>=0.64b0",
    "opentelemetry-sdk>=1.43.0",
    "pydantic>=2.13.4",
    "pyjwt[crypto]>=2.13.0",
    "pyshacl>=0.31.0",
    "python-multipart>=0.0.20",
    "rdflib>=7.6.0",
    "redis>=5",
    "uvicorn[standard]>=0.49.0",
]

[project.scripts]
weave-backend = "weave_backend:main"
weave-mock-oidc = "weave_backend.mock_oidc.app:main"

[build-system]
requires = ["uv_build>=0.11.3,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "bandit>=1.9.4",
    "mutmut>=3.6.0",
    "mypy>=2.1.0",
    "pytest>=9.1.1",
    "pytest-asyncio>=1.4.0",
    "pytest-cov>=7.1.0",
    "pyyaml>=6.0.3",
    "ruff>=0.15.20",
    "types-pyyaml>=6.0.12.20260518",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
  "E", "F", "W",
  "I",
  "B",
  "C4",
  "C901",
  "PLR0911", "PLR0912", "PLR0913", "PLR0915", "PLR1702",
  "S",
  "UP",
  "SIM",
  "RUF",
]
ignore = []

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-args = 5
max-branches = 12
max-returns = 6
max-statements = 50
max-nested-blocks = 4

[tool.ruff.lint.per-file-ignores]
# S101 asserts are the point of a test. S603/S607: tests intentionally shell
# out to known dev tools (terraform/docker/gitleaks/make) by name for
# portability across machines/CI. S311: random test-fixture data generation,
# not a cryptographic use. S105: false positive — "Secret"/"Match" below are
# gitleaks JSON report field names, not credentials. S106: fake tokens/secret
# refs passed as keyword args to test fixtures/mocks, never real credentials.
"tests/**" = ["S101", "S603", "S607", "S311", "S105", "S106"]
# generation/gates.py: the M1 safety gates shell out to the exact dev tools
# Law F mandates (bandit/semgrep/mypy/tsc/mutmut) by name, over our own
# tempfile.mkdtemp workspace (never user-supplied) — S603/S607 are the point.
"src/weave_backend/generation/gates.py" = ["S603", "S607"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true
disallow_untyped_defs = true
no_implicit_optional = true

# asyncpg/boto3/botocore ship no py.typed marker / official stubs; there's
# no maintained stub package worth adding as a dependency for this task's
# scope. Every other project dependency keeps strict checking.
[[tool.mypy.overrides]]
module = ["asyncpg.*", "boto3.*", "botocore.*"]
ignore_missing_imports = true

# scripts/benchmarks/ce-perf/run_benchmark.py (and run_metrics_benchmark.py,
# CE-V1-TASK-007) are spike tools outside this package's src/ tree
# (sys.path-inserted by their tests at collection time), not shipped
# dependencies with a stub package.
[[tool.mypy.overrides]]
module = ["run_benchmark", "run_metrics_benchmark"]
ignore_missing_imports = true

# mutmut runs the suite against a mutated copy of the tree under mutants/;
# migrate.py resolves MIGRATIONS_DIR relative to its own file, so without
# this the mutant run sees an empty migrations dir, applies nothing, and the
# `weave_app` role never exists (first mutation-strict CI failure).
[tool.mutmut]
also_copy = ["migrations/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q --strict-markers -m 'not integration and not e2e'"
asyncio_mode = "auto"
markers = [
  "integration: needs terraform/docker/network; excluded from the default fast run",
  "e2e: static or live end-to-end assertions; excluded from the default fast run",
  "docker: boots the full docker-compose stack (slow, image pulls); local/nightly only",
  "stack: manages its own full docker-compose lifecycle (incl. ollama); excluded from the CI integration job, which starts only the services it needs",
]
