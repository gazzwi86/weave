[project]
name = "weave-backend"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Gareth Williams", email = "gazzwi86@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.139.0",
    "pydantic>=2.13.4",
    "uvicorn[standard]>=0.49.0",
]

[project.scripts]
weave-backend = "weave_backend:main"

[build-system]
requires = ["uv_build>=0.11.3,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "bandit>=1.9.4",
    "httpx>=0.28.1",
    "mutmut>=3.6.0",
    "mypy>=2.1.0",
    "pytest>=9.1.1",
    "pytest-asyncio>=1.4.0",
    "pyyaml>=6.0.3",
    "ruff>=0.15.20",
    "types-pyyaml>=6.0.12.20260518",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
  "E", "F", "W",
  "I",
  "B",
  "C4",
  "C901",
  "PLR0911", "PLR0912", "PLR0913", "PLR0915", "PLR1702",
  "S",
  "UP",
  "SIM",
  "RUF",
]
ignore = []

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-args = 5
max-branches = 12
max-returns = 6
max-statements = 50
max-nested-blocks = 4

[tool.ruff.lint.per-file-ignores]
# S101 asserts are the point of a test. S603/S607: tests intentionally shell
# out to known dev tools (terraform/docker/gitleaks/make) by name for
# portability across machines/CI. S311: random test-fixture data generation,
# not a cryptographic use. S105: false positive — "Secret"/"Match" below are
# gitleaks JSON report field names, not credentials.
"tests/**" = ["S101", "S603", "S607", "S311", "S105"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true
disallow_untyped_defs = true
no_implicit_optional = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q --strict-markers -m 'not integration and not e2e'"
asyncio_mode = "auto"
markers = [
  "integration: needs terraform/docker/network; excluded from the default fast run",
  "e2e: static or live end-to-end assertions; excluded from the default fast run",
  "docker: boots the full docker-compose stack (slow, image pulls); local/nightly only",
]
