<!doctype html>
<!--
  THROWAWAY spike harness for TASK-001 (GE-EPIC-001). Not production UI --
  no design tokens, no framework. Loaded via file:// by bench.spec.ts only.
-->
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body { margin: 0; padding: 0; }
      #cy { width: 1200px; height: 800px; }
    </style>
  </head>
  <body>
    <div id="cy"></div>
    <!-- UMD load order: layout-base -> cose-base -> cytoscape-fcose depend on
         each other as browser globals (no bundler in this throwaway page). -->
    <script src="./node_modules/cytoscape/dist/cytoscape.umd.js"></script>
    <script src="./node_modules/layout-base/layout-base.js"></script>
    <script src="./node_modules/cose-base/cose-base.js"></script>
    <script src="./node_modules/cytoscape-fcose/cytoscape-fcose.js"></script>
    <script>
      cytoscape.use(cytoscapeFcose);
      window.__cytoscape = cytoscape;
    </script>
  </body>
</html>
