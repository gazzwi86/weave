document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t: #161E2E;\n  --line-strong: #2A3550;\n\n  /* Text */\n  --text: #E5EAF2;\n  --text-dim: #8A95A8;\n  --text-mute: #5C6779;\n  --text-faint: #404B5E;\n\n  /* Brand — electric blue / Polaris */\n  --blue: #3B82F6;\n  --blue-bright: #60A5FA;\n  --blue-dim: #1E3A8A;\n  --blue-glow: rgba(59, 130, 246, 0.18);\n\n  /* Status */\n  --amber: #F59E0B;\n  --green: #10B981;\n  --red: #EF4444;\n  --purple: #8B5CF6;\n  --cyan: #22D3EE;\n  --pink: #EC4899;\n\n  --amber-bg: rgba(245, 158, 11, 0.10);\n  --green-bg: rgba(16, 185, 129, 0.10);\n  --red-bg: rgba(239, 68, 68, 0.10);\n  --raised-strong: #1B2434;\n  --blue-soft: rgba(91,141,239,0.10);\n  --purple-bg: rgba(139, 92, 246, 0.12);\n  --blue-bg: rgba(59, 130, 246, 0.10);\n\n  /* Type */\n  --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --mono: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;\n\n  /* Shadows */\n  --shadow-1: 0 1px 0 rgba(255,255,255,0.02) inset, 0 1px 2px rgba(0,0,0,0.4);\n  --shadow-panel: -16px 0 40px rgba(0,0,0,0.45);\n  --ring-blue: 0 0 0 1px rgba(59,130,246,0.6), 0 0 16px rgba(59,130,246,0.25);\n}\n\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml, body, #root {\n  height: 100%;\n  margin: 0;\n  padding: 0;\n  background: var(--bg);\n}\n\nbody {\n  font-family: var(--sans);\n  font-size: 13px;\n  line-height: 1.45;\n  color: var(--text);\n  -webkit-font-smoothing: antialiased;\n  font-feature-settings: 'cv02','cv03','cv04','cv11';\n}\n\nbutton { font-family: inherit; color: inherit; cursor: pointer; }\n\n::selection { background: rgba(59,130,246,0.35); }\n\n/* Scrollbars */\n::-webkit-scrollbar { width: 10px; height: 10px; }\n::-webkit-scrollbar-track { background: transparent; }\n::-webkit-scrollbar-thumb { background: #1F2937; border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }\n::-webkit-scrollbar-thumb:hover { background: #2A3550; background-clip: padding-box; border: 2px solid transparent; }\n\n.mono { font-family: var(--mono); font-feature-settings: 'zero','ss01'; }\n\n/* Page transitions */\n@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }\n@keyframes slideInRight {\n  from { opacity: 0; transform: translateX(8px); }\n  to { opacity: 1; transform: translateX(0); }\n}\n@keyframes slideInPanel {\n  from { transform: translateX(100%); }\n  to { transform: translateX(0); }\n}\n@keyframes pulseGlow {\n  0%, 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0.4); }\n  50% { box-shadow: 0 0 0 4px rgba(59,130,246,0.0); }\n}\n@keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0.3; } }\n@keyframes shimmer {\n  0% { background-position: -200px 0; }\n  100% { background-position: 200px 0; }\n}\n\n.page-enter { animation: fadeIn 180ms ease-out; }\n.panel-enter { animation: slideInPanel 200ms cubic-bezier(0.2, 0.8, 0.2, 1); }\n.running-glow { animation: pulseGlow 2s ease-in-out infinite; }\n.blink { animation: blink 1.1s step-end infinite; }\n\n/* Generic surfaces */\n.surface { background: var(--surface); border: 1px solid var(--line); border-radius: 6px; }\n.raised { background: var(--raised); border: 1px solid var(--line); border-radius: 6px; }\n.divider { height: 1px; background: var(--line); }\n\n/* Focus */\n:focus-visible { outline: 2px solid var(--blue); outline-offset: 1px; border-radius: 3px; }\n\n/* Code block syntax (very simple) */\n.tk-key { color: #93C5FD; }\n.tk-str { color: #86EFAC; }\n.tk-num { color: #FDBA74; }\n.tk-cm  { color: #5C6779; font-style: italic; }\n.tk-pun { color: #6B7280; }\n.tk-id  { color: #E5EAF2; }\n\n/* Tag chips */\n.chip {\n  display: inline-flex; align-items: center; gap: 4px;\n  height: 20px; padding: 0 6px;\n  border-radius: 4px;\n  background: var(--raised);\n  border: 1px solid var(--line);\n  color: var(--text-dim);\n  font-size: 11px;\n  font-weight: 500;\n}\n.chip.blue   { background: var(--blue-bg);   border-color: rgba(59,130,246,0.35);  color: #BFDBFE; }\n.chip.green  { background: var(--green-bg);  border-color: rgba(16,185,129,0.35);  color: #A7F3D0; }\n.chip.amber  { background: var(--amber-bg);  border-color: rgba(245,158,11,0.35);  color: #FCD34D; }\n.chip.red    { background: var(--red-bg);    border-color: rgba(239,68,68,0.35);   color: #FCA5A5; }\n.chip.purple { background: var(--purple-bg); border-color: rgba(139,92,246,0.35);  color: #DDD6FE; }\n\n.select-fake {\n  appearance: none;\n  background: var(--raised);\n  border: 1px solid var(--line);\n  border-radius: 4px;\n  color: var(--text);\n  font-family: inherit;\n  font-size: 12px;\n  padding: 6px 26px 6px 10px;\n  cursor: pointer;\n  width: 100%;\n  background-image: linear-gradient(45deg, transparent 50%, var(--text-mute) 50%), linear-gradient(135deg, var(--text-mute) 50%, transparent 50%);\n  background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;\n  background-size: 5px 5px, 5px 5px;\n  background-repeat: no-repeat;\n}\n.select-fake:disabled { opacity: 0.5; cursor: not-allowed; }\n.chip.cyan   { background: rgba(34,211,238,0.10); border-color: rgba(34,211,238,0.35); color: #A5F3FC; }\n\n/* Buttons */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 6px;\n  height: 28px; padding: 0 10px;\n  border-radius: 5px;\n  background: var(--raised);\n  border: 1px solid var(--line-strong);\n  color: var(--text);\n  font-size: 12px; font-weight: 500;\n  transition: background 120ms, border 120ms;\n}\n.btn:hover { background: var(--hover); border-color: #34405E; }\n.btn.primary { background: var(--blue); border-color: var(--blue); color: white; }\n.btn.primary:hover { background: #2563EB; border-color: #2563EB; }\n.btn.ghost { background: transparent; border-color: transparent; color: var(--text-dim); }\n.btn.ghost:hover { background: var(--raised); color: var(--text); }\n.btn.sm { height: 22px; padding: 0 7px; font-size: 11px; border-radius: 4px; }\n.btn.lg { height: 36px; padding: 0 14px; font-size: 13px; }\n\n/* Sparkline */\n.spark { display: block; }\n\n/* Active indicator */\n.dot {\n  display: inline-block; width: 6px; height: 6px; border-radius: 50%;\n}\n.dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }\n.dot.amber { background: var(--amber); box-shadow: 0 0 6px var(--amber); }\n.dot.red   { background: var(--red);   box-shadow: 0 0 6px var(--red); }\n.dot.blue  { background: var(--blue);  box-shadow: 0 0 6px var(--blue); }\n.dot.purple{ background: var(--purple);box-shadow: 0 0 6px var(--purple); }\n.dot.gray  { background: #475569; }\n\n/* Avatar */\n.avatar {\n  display: inline-flex; align-items: center; justify-content: center;\n  width: 22px; height: 22px;\n  border-radius: 50%;\n  font-size: 10px; font-weight: 600;\n  color: #E5EAF2;\n  background: linear-gradient(135deg, #1E3A8A, #0EA5E9);\n  border: 1px solid rgba(255,255,255,0.06);\n  flex-shrink: 0;\n}\n\n/* Tables */\n.tbl { width: 100%; border-collapse: collapse; font-size: 12.5px; }\n.tbl th {\n  text-align: left;\n  font-weight: 500;\n  color: var(--text-mute);\n  font-size: 11px;\n  text-transform: uppercase;\n  letter-spacing: 0.04em;\n  padding: 8px 12px;\n  border-bottom: 1px solid var(--line);\n  background: var(--surface);\n}\n.tbl td {\n  padding: 10px 12px;\n  border-bottom: 1px solid var(--line-soft);\n  height: 36px;\n}\n.tbl tr:hover td { background: rgba(255,255,255,0.018); }\n.tbl tr.clickable { cursor: pointer; }\n\n/* Progress bar */\n.bar {\n  height: 4px; background: var(--line); border-radius: 2px; overflow: hidden;\n}\n.bar > div { height: 100%; background: var(--blue); border-radius: 2px; }\n.bar.amber > div { background: var(--amber); }\n.bar.green > div { background: var(--green); }\n.bar.red > div { background: var(--red); }\n\n/* Section headers */\n.h-eyebrow {\n  font-size: 10px;\n  text-transform: uppercase;\n  letter-spacing: 0.08em;\n  color: var(--text-mute);\n  font-weight: 600;\n}\n\n/* Glow border (active task) */\n.glow-blue {\n  box-shadow: 0 0 0 1px rgba(59,130,246,0.5), 0 0 14px rgba(59,130,246,0.25), inset 0 0 24px rgba(59,130,246,0.05);\n  border-color: rgba(59,130,246,0.45) !important;\n}\n\n/* Mermaid-ish diagram boxes */\n.diag-box {\n  border: 1px solid var(--line-strong);\n  background: var(--raised);\n  border-radius: 4px;\n  padding: 8px 10px;\n  font-family: var(--mono);\n  font-size: 11px;\n}\n\n/* App layout */\n.app-grid {\n  display: grid;\n  grid-template-rows: 44px auto 1fr;\n  height: 100%;\n}\n\n/* Top nav */\n.topnav {\n  display: flex; align-items: center;\n  height: 44px;\n  padding: 0 16px;\n  background: linear-gradient(180deg, #0C111B 0%, #0A0E14 100%);\n  border-bottom: 1px solid var(--line);\n  position: relative;\n  z-index: 50;\n}\n.subnav {\n  display: flex; align-items: center;\n  height: 36px;\n  padding: 0 16px;\n  background: var(--surface);\n  border-bottom: 1px solid var(--line);\n  gap: 4px;\n}\n\n.tab {\n  display: inline-flex; align-items: center; gap: 6px;\n  height: 28px; padding: 0 10px;\n  border-radius: 5px;\n  color: var(--text-dim);\n  font-size: 12.5px; font-weight: 500;\n  background: transparent;\n  border: 1px solid transparent;\n  cursor: pointer;\n}\n.tab:hover { background: var(--raised); color: var(--text); }\n.tab.active { background: var(--raised); color: var(--text); border-color: var(--line-strong); }\n\n.subtab {\n  display: inline-flex; align-items: center; gap: 6px;\n  height: 24px; padding: 0 10px;\n  border-radius: 4px;\n  color: var(--text-dim);\n  font-size: 12px;\n  cursor: pointer;\n  border-bottom: 2px solid transparent;\n  margin-bottom: -1px;\n  border-radius: 0;\n  padding-bottom: 8px;\n  height: 32px;\n}\n.subtab:hover { color: var(--text); }\n.subtab.active { color: var(--text); border-bottom-color: var(--blue); }\n\n/* Detail panel slide-in */\n.detail-panel {\n  position: fixed;\n  top: 44px; right: 0; bottom: 0;\n  width: 520px;\n  background: var(--surface);\n  border-left: 1px solid var(--line);\n  box-shadow: var(--shadow-panel);\n  display: flex; flex-direction: column;\n  z-index: 40;\n}\n\n/* Modal overlay */\n.modal-backdrop {\n  position: fixed; inset: 0;\n  background: rgba(5, 8, 14, 0.6);\n  backdrop-filter: blur(2px);\n  z-index: 60;\n  display: flex; align-items: flex-start; justify-content: center;\n  padding-top: 64px;\n  animation: fadeIn 160ms ease-out;\n}\n\n/* FAB */\n.fab {\n  position: fixed; bottom: 20px; right: 20px;\n  display: inline-flex; align-items: center; gap: 8px;\n  height: 40px; padding: 0 14px 0 12px;\n  border-radius: 999px;\n  background: linear-gradient(180deg, #1E2740 0%, #131A28 100%);\n  border: 1px solid rgba(139, 92, 246, 0.35);\n  color: var(--text);\n  font-size: 12.5px; font-weight: 500;\n  box-shadow: 0 6px 20px rgba(0,0,0,0.5), 0 0 0 1px rgba(139,92,246,0.08), 0 0 24px rgba(139,92,246,0.15);\n  z-index: 35;\n}\n.fab:hover { border-color: rgba(139, 92, 246, 0.6); }\n\n/* Logo brand mark */\n.brand {\n  display: inline-flex; align-items: center; gap: 8px;\n  cursor: pointer;\n  user-select: none;\n}\n.brand-mark {\n  width: 22px; height: 22px;\n  display: flex; align-items: center; justify-content: center;\n}\n.brand-name {\n  font-family: var(--mono);\n  font-weight: 600;\n  font-size: 13px;\n  letter-spacing: -0.02em;\n  color: var(--text);\n}\n\n/* Input */\n.inp {\n  height: 28px;\n  padding: 0 10px;\n  background: var(--bg);\n  border: 1px solid var(--line);\n  border-radius: 5px;\n  color: var(--text);\n  font-size: 12.5px;\n  font-family: inherit;\n  width: 100%;\n}\n.inp:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }\n\n.inp.lg { height: 36px; font-size: 13.5px; }\n.inp.search {\n  background: var(--raised); padding-left: 30px;\n}\n\n/* Kbd */\n.kbd {\n  font-family: var(--mono);\n  font-size: 10px;\n  display: inline-flex; align-items: center;\n  height: 16px; padding: 0 4px;\n  border-radius: 3px;\n  background: rgba(255,255,255,0.04);\n  border: 1px solid var(--line);\n  color: var(--text-mute);\n}\n\n/* Scrollable column */\n.col-scroll { overflow: auto; }\n.no-scrollbar::-webkit-scrollbar { display: none; }\n\n/* Card */\n.card {\n  background: var(--raised);\n  border: 1px solid var(--line);\n  border-radius: 6px;\n  padding: 14px;\n}\n.card.hover:hover { background: var(--overlay); border-color: var(--line-strong); }\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n<div id=\"root\"><\u002Fdiv>\n\n<script src=\"https://unpkg.com/react@18.3.1/umd/react.development.js\" integrity=\"sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L\" crossorigin=\"anonymous\"><\u002Fscript>\n<script src=\"https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js\" integrity=\"sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm\" crossorigin=\"anonymous\"><\u002Fscript>\n<script src=\"https://unpkg.com/@babel/standalone@7.29.0/babel.min.js\" integrity=\"sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y\" crossorigin=\"anonymous\"><\u002Fscript>\n\n<script type=\"text/babel\" src=\"1a7da9c1-d34f-40c2-bc98-1c2fade2cb7d\"><\u002Fscript>\n<script type=\"text/babel\" src=\"2ee3b400-72bf-42a1-85e7-a96adaee9843\"><\u002Fscript>\n<script type=\"text/babel\" src=\"7ce059fb-5711-449b-8cac-4c333d471f1b\"><\u002Fscript>\n<script type=\"text/babel\" src=\"53f2c5fd-716d-49b3-b8b3-e9add92d35ab\"><\u002Fscript>\n\n<script type=\"text/babel\" src=\"fe50443e-e8be-4a71-9ef1-9356d423463c\"><\u002Fscript>\n<script type=\"text/babel\" src=\"5a642673-69da-49ea-850d-6614c7c875eb\"><\u002Fscript>\n<script type=\"text/babel\" src=\"7c2b25b8-1347-498b-b429-2971b1c6501a\"><\u002Fscript>\n<script type=\"text/babel\" src=\"20e86a65-584c-447e-b715-c4747f10227f\"><\u002Fscript>\n<script type=\"text/babel\" src=\"b7b6e375-d30e-40c4-837a-561ddcb986de\"><\u002Fscript>\n<script type=\"text/babel\" src=\"7aced4a0-dbb3-4afd-8ad4-afdbc5462e82\"><\u002Fscript>\n<script type=\"text/babel\" src=\"ba6f47af-8a33-4887-80eb-6ad15dff763f\"><\u002Fscript>\n<script type=\"text/babel\" src=\"8db02464-cb84-41e8-854c-37480c018cac\"><\u002Fscript>\n<script type=\"text/babel\" src=\"54a5d82e-47af-4805-9316-575c6a3c1cc0\"><\u002Fscript>\n<script type=\"text/babel\" src=\"ae24acdb-27ad-49b1-884d-31f6ff29dab1\"><\u002Fscript>\n<script type=\"text/babel\" src=\"4fe1f960-6249-4550-b404-e5382992d389\"><\u002Fscript>\n<script type=\"text/babel\" src=\"1c4c8a76-bad7-4a31-8b13-0c6c44164635\"><\u002Fscript>\n<script type=\"text/babel\" src=\"df590b96-364e-44bb-aba3-5d2de631217c\"><\u002Fscript>\n<script type=\"text/babel\" src=\"abfed2eb-c4ab-4fa3-9efa-9b077c178ad0\"><\u002Fscript>\n<script type=\"text/babel\" src=\"90dd08aa-93ac-4cde-a944-b33b2d08dff3\"><\u002Fscript>\n<script type=\"text/babel\" src=\"16fc7e5a-ac77-4366-b4ac-9a149799e640\"><\u002Fscript>\n<script type=\"text/babel\" src=\"c34ce315-67d1-46a7-8b8d-bea471b77ec7\"><\u002Fscript>\n<script type=\"text/babel\" src=\"28fba0c5-9913-4b71-ba7b-8329c70c6189\"><\u002Fscript>\n<script type=\"text/babel\" src=\"c0807383-fcf9-4c9b-9cb1-8e451cf15f8d\"><\u002Fscript>\n<script type=\"text/babel\" src=\"6b195bc3-4b55-4e57-ae5b-ca0a4919be89\"><\u002Fscript>\n<script type=\"text/babel\" src=\"95177663-8d5b-478e-8fdc-9a4575e4aaf5\"><\u002Fscript>\n<script type=\"text/babel\" src=\"22b03bbe-af1e-4595-a0b2-5362e1be5e53\"><\u002Fscript>\n<script type=\"text/babel\" src=\"3b87cca1-47db-409a-aeb7-86e9abd72512\"><\u002Fscript>\n<script type=\"text/babel\" src=\"b13e338c-c048-40fa-a0a9-2e0e95efb646\"><\u002Fscript>\n<script type=\"text/babel\" src=\"2a06f8ff-15e2-463a-aac6-f9f9ebc61c4c\"><\u002Fscript>\n<script type=\"text/babel\" src=\"12c5b165-9671-4ee5-aba8-8979b59cbf4b\"><\u002Fscript>\n<script type=\"text/babel\" src=\"f16fc877-4a65-4d69-8b08-a2ca61306150\"><\u002Fscript>\n\n<script type=\"text/babel\">\nconst { useState, useEffect } = React;\n\nconst AppShell = ({ route, navigate, children }) => {\n  const [notifOpen, setNotifOpen] = useState(false);\n  const [cmdOpen, setCmdOpen] = useState(false);\n  const [avOpen, setAvOpen] = useState(false);\n\n  useEffect(() => {\n    const onKey = (e) => {\n      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {\n        e.preventDefault(); setCmdOpen(o => !o);\n      }\n      if (e.key === 'Escape') { setCmdOpen(false); setNotifOpen(false); setAvOpen(false); }\n    };\n    window.addEventListener('keydown', onKey);\n    return () => window.removeEventListener('keydown', onKey);\n  }, []);\n\n  const routeObj = { path: route, parts: route.split('/').filter(Boolean), navigate };\n  const notifs = [\n    { icon:'✓', text:'fraud-scorer v3.2 PR ready for review', project:'Fraud uplift', time:'12m', cta:'Review' },\n    { icon:'⚠', text:'Compliance gate stalled — no thread opened', project:'CSP v2', time:'1h', cta:'Open thread' },\n    { icon:'★', text:'New Polaris idea: edge cache for portal-bff', project:'Polaris', time:'2h', cta:'View' },\n    { icon:'●', text:'Audit chain verified at 04:12 UTC', project:'Platform', time:'4h', cta:'Verify' },\n  ];\n\n  return (\n    <div style={{ minHeight: '100vh', display:'flex', flexDirection:'column' }}>\n      {window.TopNav && (\n        <window.TopNav\n          route={routeObj}\n          navigate={navigate}\n          onBell={() => { setNotifOpen(o => !o); setAvOpen(false); }}\n          onCmd={() => setCmdOpen(true)}\n          onAvatar={() => { setAvOpen(o => !o); setNotifOpen(false); }}\n          notifCount={notifs.length}/>\n      )}\n      <div style={{ flex: 1, minHeight: 0 }}>\n        {children}\n      <\u002Fdiv>\n      {window.HelpFAB && <window.HelpFAB navigate={navigate}/>}\n      {window.NotificationsDropdown && <window.NotificationsDropdown open={notifOpen} onClose={() => setNotifOpen(false)} items={notifs} navigate={navigate}/>}\n      {window.CommandPalette && <window.CommandPalette open={cmdOpen} onClose={() => setCmdOpen(false)} navigate={navigate}/>}\n      {window.AvatarDropdown && <window.AvatarDropdown open={avOpen} onClose={() => setAvOpen(false)} navigate={navigate}/>}\n    <\u002Fdiv>\n  );\n};\n\nconst STATIC_ROUTES = {\n  '/login':           { c: () => window.Login,                shell: false },\n  '/dashboard':       { c: () => window.PortfolioScreen,      shell: true },\n  '/portfolio':       { c: () => window.PortfolioScreen,      shell: true },\n  '/workspaces':      { c: () => window.WorkspacesScreen,     shell: true },\n  '/projects':        { c: () => window.ProjectsScreen,       shell: true },\n  '/specs':           { c: () => window.SpecsScreen,          shell: true },\n  '/polaris':         { c: () => window.PolarisScreen,        shell: true },\n  '/ops':             { c: () => window.OpsScreen,            shell: true },\n  '/finops':          { c: () => window.FinOpsScreen,         shell: true },\n  '/org-graph':       { c: () => window.OrgGraphScreen,       shell: true },\n  '/transformations': { c: () => window.TransformationsScreen,shell: true },\n  '/snappy':          { c: () => window.SnappyScreen,         shell: true },\n  '/releases':        { c: () => window.ReleasesScreen,       shell: true },\n  '/change':          { c: () => window.ChangeMgmtScreen,     shell: true },\n  '/wiki':            { c: () => window.WikiScreen,           shell: true },\n  '/audit':           { c: () => window.AuditScreen,          shell: true },\n  '/help':            { c: () => window.HelpScreen,           shell: true },\n  '/help-me':         { c: () => window.HelpScreen,           shell: true },\n  '/settings':        { c: () => window.SettingsScreen,       shell: true },\n};\n\nconst ProjectRoute = ({ projectId, view, taskId, navigate }) => {\n  const Shell = window.ProjectShell;\n  const Dash = window.ProjectDashboard;\n  const Board = window.KanbanBoard;\n  const TaskPanel = window.TaskDetailPanel;\n  if (!Shell || !Dash || !Board) return <div style={{ padding: 32, color:'#94A3B8' }}>Loading project…<\u002Fdiv>;\n\n  const renderView = ({ project }) => {\n    if (view === 'dashboard') return <Dash project={project} navigate={navigate}/>;\n    if (view === 'kanban' || view === 'board' || view === 'tasks') {\n      return <Board project={project} navigate={navigate}\n                    onPickTask={(id) => navigate(`/project/${project.id}/${view}/task/${id}`)}\n                    activeTask={taskId}/>;\n    }\n    if (view === 'specs')   return window.SpecsScreen ? <window.SpecsScreen project={project} navigate={navigate}/> : null;\n    if (view === 'console') return <Placeholder title=\"Console\" sub=\"Live agent transcript stream — coming soon\"/>;\n    if (view === 'replan')  return window.HelpScreen ? <window.HelpScreen navigate={navigate}/> : null;\n    return <Dash project={project} navigate={navigate}/>;\n  };\n\n  return (\n    <>\n      <Shell projectId={projectId} view={view} navigate={navigate}>\n        {renderView}\n      <\u002FShell>\n      {taskId && TaskPanel && (\n        <TaskPanel\n          taskId={taskId}\n          projectId={projectId}\n          navigate={navigate}\n          onClose={() => navigate(`/project/${projectId}/${view}`)}/>\n      )}\n    <\u002F>\n  );\n};\n\nconst Placeholder = ({ title, sub }) => (\n  <div style={{ padding: '60px 24px', textAlign:'center', color:'#94A3B8' }}>\n    <div style={{ fontSize: 22, fontWeight: 600, color:'#E5EAF2' }}>{title}<\u002Fdiv>\n    <div style={{ fontSize: 13, marginTop: 6 }}>{sub}<\u002Fdiv>\n  <\u002Fdiv>\n);\n\nconst useHashRoute = () => {\n  const [hash, setHash] = useState(() => window.location.hash.replace(/^#/, '') || '/login');\n  useEffect(() => {\n    const onHash = () => setHash(window.location.hash.replace(/^#/, '') || '/login');\n    window.addEventListener('hashchange', onHash);\n    return () => window.removeEventListener('hashchange', onHash);\n  }, []);\n  return hash;\n};\n\nconst App = () => {\n  const route = useHashRoute();\n  const navigate = (p) => { window.location.hash = p; };\n\n  // Project routes\n  const projMatch = route.match(/^\\/project\\/([^/]+)\\/([^/]+)(?:\\/task\\/([^/]+))?/);\n  if (projMatch) {\n    const [, projectId, view, taskId] = projMatch;\n    return (\n      <AppShell route={route} navigate={navigate}>\n        <ProjectRoute projectId={projectId} view={view} taskId={taskId} navigate={navigate}/>\n      <\u002FAppShell>\n    );\n  }\n\n  // Workspace routes  /workspace/<id>[/<view>]\n  const wsMatch = route.match(/^\\/workspace\\/([^/]+)(?:\\/([^/]+))?/);\n  if (wsMatch && window.WorkspaceDetail) {\n    const [, workspaceId, view='overview'] = wsMatch;\n    return (\n      <AppShell route={route} navigate={navigate}>\n        <window.WorkspaceDetail workspaceId={workspaceId} view={view} navigate={navigate}/>\n      <\u002FAppShell>\n    );\n  }\n\n  // Organisation routes — /organisation/<tab>[/<...sub>]\n  const orgMatch = route.match(/^\\/organisation(?:\\/(.+))?$/);\n  if (orgMatch && window.OrganisationShell) {\n    const sub = (orgMatch[1] || 'org-graph').split('/').filter(Boolean);\n    return (\n      <AppShell route={route} navigate={navigate}>\n        <window.OrganisationShell subRoute={sub} navigate={navigate}/>\n      <\u002FAppShell>\n    );\n  }\n\n  // Legacy direct routes — keep working but redirect into Organisation shell.\n  if (route === '/org-graph' || route === '/transformations' || route === '/finops') {\n    const map = { '/org-graph':'org-graph', '/transformations':'transformations', '/finops':'finops' };\n    if (window.OrganisationShell) {\n      return (\n        <AppShell route={route} navigate={navigate}>\n          <window.OrganisationShell subRoute={[map[route]]} navigate={navigate}/>\n        <\u002FAppShell>\n      );\n    }\n  }\n  const txMatch = route.match(/^\\/transformations\\/(.+)/);\n  if (txMatch && window.OrganisationShell) {\n    return (\n      <AppShell route={route} navigate={navigate}>\n        <window.OrganisationShell subRoute={['transformations', ...txMatch[1].split('/').filter(Boolean)]} navigate={navigate}/>\n      <\u002FAppShell>\n    );\n  }\n\n  // Spec detail — /spec/<id>\n  const specMatch = route.match(/^\\/spec\\/([^/]+)/);\n  if (specMatch && window.SpecDetail) {\n    return (\n      <AppShell route={route} navigate={navigate}>\n        <window.SpecDetail specId={specMatch[1]} navigate={navigate}/>\n      <\u002FAppShell>\n    );\n  }\n\n  // Task-only legacy\n  const taskOnly = route.match(/^\\/task\\/([^/]+)/);\n  if (taskOnly && window.TaskDetailPanel && window.PortfolioScreen) {\n    return (\n      <AppShell route={route} navigate={navigate}>\n        <window.PortfolioScreen navigate={navigate}/>\n        <window.TaskDetailPanel taskId={taskOnly[1]} navigate={navigate} onClose={() => navigate('/dashboard')}/>\n      <\u002FAppShell>\n    );\n  }\n\n  const r = STATIC_ROUTES[route] || STATIC_ROUTES['/dashboard'];\n  const Comp = r.c();\n  if (!Comp) return <div style={{ padding: 40, color:'#94A3B8', fontFamily:'Inter' }}>Loading {route}…<\u002Fdiv>;\n\n  if (!r.shell) return <Comp navigate={navigate}/>;\n  return (\n    <AppShell route={route} navigate={navigate}>\n      <Comp navigate={navigate}/>\n    <\u002FAppShell>\n  );\n};\n\nReactDOM.createRoot(document.getElementById('root')).render(<App/>);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
