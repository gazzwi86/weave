# Local full-stack dev: backend on :8000, frontend on :5173.
services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      # ANTHROPIC_API_KEY enables the natural-language editing features.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      WEAVE_LLM_MODEL: ${WEAVE_LLM_MODEL:-claude-sonnet-4-6}
      WEAVE_DATA_DIR: /data
      WEAVE_SEED_DEMO: "true"
      WEAVE_CORS_ORIGINS: http://localhost:5173
    volumes:
      - weave-data:/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  weave-data:
