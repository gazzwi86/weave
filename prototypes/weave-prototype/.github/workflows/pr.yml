name: PR

# Fast feedback on every PR and on feature-branch pushes.
on:
  pull_request:
  push:
    branches-ignore: [main]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint · complexity · tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Cyclomatic complexity gate (xenon, max grade B)
        run: xenon --max-absolute B --max-modules B --max-average A app
      - name: Maintainability index (radon, expect A)
        run: radon mi app -n B
      - name: Tests
        run: pytest --cov=app --cov-report=term-missing

  frontend:
    name: Frontend (lint · types · unit · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build

  e2e:
    name: Frontend e2e (Playwright) + Lighthouse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Start backend
        working-directory: backend
        run: |
          pip install -e ".[dev]"
          WEAVE_DATA_DIR=./data WEAVE_SEED_DEMO=true \
            nohup python -m uvicorn app.main:app --port 8000 >/tmp/backend.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:8000/api/health && break || sleep 1; done
      - name: Frontend deps + build
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: e2e
        working-directory: frontend
        run: npm run test:e2e
      - name: Lighthouse
        working-directory: frontend
        run: npm run lint:lighthouse || echo "Lighthouse advisory only"
