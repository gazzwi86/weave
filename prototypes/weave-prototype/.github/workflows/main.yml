name: Main

# Build (and, once an AWS account is wired, deploy) on every push to main.
on:
  push:
    branches: [main]

concurrency:
  group: main
  cancel-in-progress: false

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: pytest

  build-images:
    name: Build container images
    needs: [backend-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t weave-backend:${{ github.sha }} ./backend
      - name: Build frontend image
        run: |
          if [ -f frontend/Dockerfile ]; then
            docker build -t weave-frontend:${{ github.sha }} ./frontend
          else
            echo "frontend/ not present yet — skipping"
          fi

  deploy:
    name: Deploy (AWS — placeholder)
    needs: [build-images]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy placeholder
        run: |
          echo "Deployment target is TBD (AWS account not yet provisioned)."
          echo "When ready: push images to ECR and apply infra/terraform."
          echo "See infra/terraform/README.md and ROADMAP.md (P7)."
