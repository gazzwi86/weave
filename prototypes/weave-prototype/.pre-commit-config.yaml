# Git hooks via pre-commit. Install with:
#   pip install pre-commit
#   pre-commit install            # runs on commit
#   pre-commit install -t pre-push  # runs the backend tests on push
#
# Run against everything once with:  pre-commit run --all-files
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        name: ruff (lint, backend)
        files: ^backend/
        args: [--fix]
      - id: ruff-format
        name: ruff format (backend)
        files: ^backend/

  - repo: local
    hooks:
      - id: backend-tests
        name: backend tests (pytest)
        entry: bash -c 'cd backend && .venv/bin/python -m pytest -q'
        language: system
        pass_filenames: false
        files: ^backend/
        stages: [pre-push]
